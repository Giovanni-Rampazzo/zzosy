# Nixpacks config pra Railway. Monorepo npm workspaces — install no root
# (instala todos workspaces juntos), build via --workspace=web.
# Cache do npm vai pra /tmp pra evitar conflito EBUSY com cache mount do Docker.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --include=dev --cache /tmp/.npm-cache"]

[phases.build]
cmds = ["npm run build --workspace=web"]

[start]
cmd = "npm run start --workspace=web"

[variables]
NPM_CONFIG_CACHE = "/tmp/.npm-cache"
